name: Build Docker image (GHCR)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build & push amd64 image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Resolve version
        id: version
        shell: bash
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            SAFE_REF="${GITHUB_REF_NAME//\//-}"
            SAFE_REF="${SAFE_REF//:/-}"
            SAFE_REF="${SAFE_REF//@/-}"
            VERSION="${SAFE_REF}-${SHORT_SHA}"
          fi
          echo "${VERSION}" > VERSION
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Normalize image repository
        shell: bash
        run: echo "IMAGE_REPOSITORY=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_ENV}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.value }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image references
        shell: bash
        run: |
          echo "### Published image" >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
          echo "${{ steps.meta.outputs.tags }}" >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
          echo "Digest: ${{ steps.build.outputs.digest }}" >> "${GITHUB_STEP_SUMMARY}"
